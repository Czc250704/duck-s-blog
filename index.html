<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Public Studio · Duck's Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#e67e22', 600: '#d35400', 50: '#fef9f0', 100: '#fff2e6' }
                    },
                    borderRadius: { 'xl': '0.75rem', '2xl': '1rem' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/libs/marked.min.js"></script>
    <link rel="stylesheet" href="assets/libs/katex/katex.min.css">
    <script src="assets/libs/katex/katex.min.js"></script>
</head>
<body class="bg-orange-50 font-[Inter] text-stone-800 antialiased">

    <!-- 启动动画层（简化为登录前的欢迎动画） -->
    <div id="splashLayer" class="splash-layer">
        <div class="splash-studio">Public Studio</div>
    </div>

    <!-- 主内容（登录前即可浏览，但需根据分类密码访问） -->
    <div id="mainContent" class="main-content hidden">
        <header class="main-header">
            <div class="header-title">Duck's Blog</div>
            <div class="header-subtitle">Public Studio</div>
            <div class="header-user">
                <span id="userRoleBadge"></span>
                <button id="logoutBtn" class="logout-btn hidden">退出登录</button>
                <button id="loginBtn" class="login-btn">登录</button>
            </div>
        </header>

        <div class="two-column-layout">
            <!-- 左侧：博客内容区 -->
            <main class="main-area">
                <div id="categoriesView" class="categories-view">
                    <div class="section-header">
                        <h2 class="section-title">分类</h2>
                        <button id="newCategoryBtn" class="new-category-btn hidden">+ 新建分类</button>
                    </div>
                    <div class="categories-grid" id="categoriesGrid"></div>
                </div>

                <div id="filesView" class="files-view hidden">
                    <div class="files-header">
                        <button id="backToCategories" class="back-button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                            返回分类
                        </button>
                        <h2 id="currentCategoryTitle" class="current-category-title"></h2>
                        <button id="deleteCategoryBtn" class="delete-category-btn hidden">删除分类</button>
                    </div>
                    <div id="filesList" class="files-list"></div>
                    <!-- 上传组件（仅管理员可见） -->
                    <div id="uploadPanel" class="upload-panel hidden">
                        <div class="upload-header">上传新文件</div>
                        <input type="file" id="fileInput" accept=".md,.txt,.ppt,.pptx,.doc,.docx,.xls,.xlsx,.pdf,.jpg,.png,.gif" class="upload-input">
                        <input type="text" id="fileTitle" placeholder="文件标题" class="upload-input">
                        <textarea id="fileDesc" placeholder="文件描述" rows="2" class="upload-input"></textarea>
                        <button id="uploadSubmit" class="upload-submit">提交审核</button>
                    </div>
                </div>

                <!-- 审批面板（仅主管理员可见） -->
                <div id="approvalPanel" class="approval-panel hidden">
                    <h3 class="approval-title">待审批文件</h3>
                    <div id="pendingList" class="pending-list"></div>
                </div>
            </main>

            <!-- 右侧信息面板 -->
            <aside class="info-panel">
                <div class="panel-card">
                    <div class="panel-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v12m0 0l-3-3m3 3l3-3M5 21h14"/></svg>
                        <span>最新上传</span>
                    </div>
                    <ul id="recentUploadsList" class="recent-list"></ul>
                </div>

                <div class="panel-card">
                    <div class="panel-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        <span>动态评论</span>
                    </div>
                    <div id="commentsList" class="comments-list"></div>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="写下你的评论..." class="comment-input">
                        <button id="submitComment" class="comment-submit">发布</button>
                    </div>
                </div>

                <div class="panel-card">
                    <div class="panel-header">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 10l12-2"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                        <span>音乐播放器</span>
                    </div>
                    <div id="musicPlayer" class="music-player">
                        <div id="currentTrack" class="current-track">未选择歌曲</div>
                        <div class="player-controls">
                            <button id="prevTrack" class="player-btn">⏮</button>
                            <button id="playPause" class="player-btn play-btn">▶</button>
                            <button id="nextTrack" class="player-btn">⏭</button>
                        </div>
                        <audio id="audioPlayer" style="display:none"></audio>
                        <div id="playlist" class="playlist"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-window" id="modalWindow">
            <div class="modal-header" id="modalHeader">
                <div class="modal-buttons">
                    <button class="modal-close"></button>
                    <button class="modal-minimize"></button>
                    <button class="modal-maximize"></button>
                </div>
                <span class="modal-title">预览窗口</span>
                <div class="modal-placeholder"></div>
            </div>
            <div id="previewContainer" class="modal-body"></div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
