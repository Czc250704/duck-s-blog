<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Duck's Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#e67e22', 600: '#d35400', 50: '#fef9f0', 100: '#fff2e6' }
                    },
                    borderRadius: { 'xl': '0.75rem', '2xl': '1rem' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/libs/marked.min.js"></script>
    <link rel="stylesheet" href="assets/libs/katex/katex.min.css">
    <script src="assets/libs/katex/katex.min.js"></script>
</head>
<body class="bg-orange-50 font-[Inter] text-stone-800 antialiased">

    <!-- 启动动画层 -->
    <div id="splash" class="splash-layer">
        <div id="splashText" class="splash-text">duckpublic</div>
    </div>

    <!-- 主内容 -->
    <div id="mainContent" class="main-content hidden">
        <!-- 头部导航 -->
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-orange-100">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <a href="#" class="text-2xl font-bold text-orange-500 tracking-tight">Duck's Blog</a>
                <nav class="hidden md:flex gap-6">
                    <a href="#" class="nav-link text-stone-600 hover:text-orange-500 transition">首页</a>
                    <a href="#" class="nav-link text-stone-600 hover:text-orange-500">归档</a>
                    <a href="#" class="nav-link text-stone-600 hover:text-orange-500">关于</a>
                </nav>
            </div>
        </header>

        <!-- 分类板块（大按钮块） -->
        <div id="categoriesView" class="max-w-7xl mx-auto px-6 py-10">
            <h2 class="text-2xl font-bold text-stone-700 mb-6">分类浏览</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="categoriesGrid"></div>
        </div>

        <!-- 文件列表视图（初始隐藏） -->
        <div id="filesView" class="max-w-7xl mx-auto px-6 py-10 hidden">
            <div class="flex items-center gap-3 mb-6">
                <button id="backToCategories" class="flex items-center gap-2 text-orange-500 hover:text-orange-600 transition">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><use href="assets/icons/sprite.svg#icon-arrow-left"/></svg>
                    返回分类
                </button>
                <h2 id="currentCategoryTitle" class="text-2xl font-bold text-stone-700"></h2>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- 左侧：文件列表（小卡片） -->
                <div class="lg:col-span-3" id="filesList"></div>
                <!-- 右侧：侧边栏（当前分类下的文件导航） -->
                <aside class="space-y-4">
                    <div class="bg-white/80 backdrop-blur-sm rounded-xl border border-orange-100 p-4 shadow-sm">
                        <div class="flex items-center gap-2 text-orange-500 font-semibold mb-3">
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><use href="assets/icons/sprite.svg#icon-folder"/></svg>
                            <span class="text-sm">本分类文件</span>
                        </div>
                        <ul id="fileSidebarList" class="space-y-2 text-sm max-h-96 overflow-y-auto"></ul>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <!-- Mac 风格预览模态框 -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-window" id="modalWindow">
            <div class="modal-header" id="modalHeader">
                <div class="modal-buttons">
                    <button class="modal-close" title="关闭"></button>
                    <button class="modal-minimize" title="最小化"></button>
                    <button class="modal-maximize" title="最大化"></button>
                </div>
                <span class="modal-title">预览窗口</span>
                <div class="modal-placeholder"></div>
            </div>
            <div id="previewContainer" class="modal-body"></div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
