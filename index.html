<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck's Blog</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#e67e22', 600: '#d35400', 50: '#fef9f0', 100: '#fff2e6' }
                    }
                }
            }
        }
    </script>
    <!-- Markdown 渲染库 -->
    <script src="assets/libs/marked.min.js"></script>
    <!-- MathJax 数学公式渲染 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'no-mathjax',
                processHtmlClass: 'math'
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady();
                }
            }
        };
    </script>
    <script src="assets/libs/mathjax/tex-chtml.js" id="MathJax-script" async></script>
    <!-- 自定义样式（动画 + MD 渲染） -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body class="bg-orange-50 font-[Inter] text-stone-800">

    <!-- 头部 -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold text-orange-500 tracking-tight">Duck's Blog</a>
            <nav class="hidden md:flex gap-6">
                <a href="#" class="nav-link text-stone-600 hover:text-orange-500 font-medium pb-1">首页</a>
                <a href="#" class="nav-link text-stone-600 hover:text-orange-500">归档</a>
                <a href="#" class="nav-link text-stone-600 hover:text-orange-500">关于</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧文档列表 -->
            <div class="lg:col-span-2" id="docsList">
                <div class="text-center py-10 text-stone-400">加载文档列表中...</div>
            </div>

            <!-- 右侧边栏（每个卡片独立动画） -->
            <aside class="space-y-6">
                <!-- 搜索框 -->
                <div class="bg-white rounded-2xl border border-orange-100 p-5 shadow-sm animate-slideInLeft">
                    <div class="flex items-center gap-2 text-orange-500 font-semibold mb-3">
                        <svg class="w-5 h-5 fill-current"><use href="assets/icons/sprite.svg#icon-search"/></svg>
                        <span>搜索文章</span>
                    </div>
                    <input type="text" id="searchInput" placeholder="关键词..." class="w-full px-4 py-2 border border-orange-100 rounded-full bg-white focus:outline-none focus:ring-2 focus:ring-orange-200 text-sm">
                </div>

                <!-- 关于作者 -->
                <div class="bg-white rounded-2xl border border-orange-100 p-5 shadow-sm text-center animate-slideInLeft" style="animation-delay: 0.05s">
                    <div class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-3">
                        <svg class="w-10 h-10 fill-orange-500"><use href="assets/icons/sprite.svg#icon-user"/></svg>
                    </div>
                    <h3 class="font-bold text-lg">Duck</h3>
                    <p class="text-sm text-stone-500 mt-1">会用AI的duck</p>
                    <p class="text-xs text-stone-400 mt-2">热爱PS / 技术分享</p>
                </div>

                <!-- 最新文章 -->
                <div class="bg-white rounded-2xl border border-orange-100 p-5 shadow-sm animate-slideInLeft" style="animation-delay: 0.1s">
                    <div class="flex items-center gap-2 text-orange-500 font-semibold mb-3">
                        <svg class="w-5 h-5 fill-current"><use href="assets/icons/sprite.svg#icon-clock"/></svg>
                        <span>最新发布</span>
                    </div>
                    <ul class="space-y-2 text-sm" id="recentList"></ul>
                </div>

                <!-- 分类目录 -->
                <div class="bg-white rounded-2xl border border-orange-100 p-5 shadow-sm animate-slideInLeft" style="animation-delay: 0.15s">
                    <div class="flex items-center gap-2 text-orange-500 font-semibold mb-3">
                        <svg class="w-5 h-5 fill-current"><use href="assets/icons/sprite.svg#icon-folder"/></svg>
                        <span>分类目录</span>
                    </div>
                    <ul class="space-y-2 text-sm" id="categoryList"></ul>
                </div>


    <!-- 预览模态框 -->
    <div id="previewModal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm items-center justify-center hidden">
        <div class="bg-white rounded-3xl w-11/12 max-w-5xl max-h-[90vh] overflow-auto relative modal-content">
            <button class="absolute right-4 top-4 text-orange-500 hover:text-orange-700 text-2xl font-bold z-10" id="closeModalBtn">&times;</button>
            <div id="previewContainer" class="p-6 pt-12"></div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
