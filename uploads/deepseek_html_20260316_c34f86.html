<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>25307 随机点名器 </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 20, 40, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            padding: 32px 24px 40px 24px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .title {
            text-align: center;
            margin-bottom: 24px;
        }

        .title h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #1e2f4b, #2c3f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 4px 12px rgba(0,20,50,0.1);
            margin-bottom: 4px;
        }

        .title .badge {
            background: rgba(30, 47, 75, 0.15);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #1e2f4b;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .display-area {
            background: white;
            border-radius: 40px;
            padding: 32px 20px 28px 20px;
            margin-bottom: 32px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.03), 0 20px 30px -10px rgba(23, 45, 80, 0.2);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .student-name {
            font-size: clamp(2.8rem, 15vw, 5rem);
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            color: #0b1a35;
            letter-spacing: 2px;
            word-break: break-word;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,20,40,0.08);
        }

        .student-meta {
            font-size: 1.3rem;
            text-align: center;
            color: #3e5570;
            font-weight: 450;
            background: #ecf2fa;
            display: inline-block;
            padding: 8px 24px;
            margin: 0 auto 18px auto;
            border-radius: 60px;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .extra-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            color: #2a405b;
            background: rgba(225, 235, 248, 0.6);
            padding: 10px 16px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.5);
            margin-top: 8px;
        }

        .extra-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .extra-info .count {
            background: #1e2f4b;
            color: white;
            padding: 4px 17px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .button-panel {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1 1 180px;
            background: white;
            border: none;
            padding: 20px 10px;
            font-size: 2rem;
            font-weight: 600;
            border-radius: 60px;
            color: #0f263f;
            box-shadow: 0 10px 20px -5px rgba(0, 20, 40, 0.2), 0 0 0 1px rgba(255,255,255,0.7) inset;
            transition: all 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
        }

        .action-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px -2px rgba(0, 20, 40, 0.2);
        }

        .action-btn.start {
            background: #c7f0d8;
            color: #004d2b;
        }

        .action-btn.stop {
            background: #ffe1da;
            color: #a1281a;
        }

        .action-btn:disabled {
            opacity: 0.5;
            filter: grayscale(40%);
            transform: none;
            pointer-events: none;
            box-shadow: 0 5px 15px -5px rgba(0,0,0,0.1);
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: #3a5372;
            opacity: 0.7;
            font-weight: 400;
            border-top: 1px dashed rgba(60, 80, 110, 0.2);
            padding-top: 18px;
        }

        .footer-note strong {
            font-weight: 600;
            opacity: 1;
            color: #1d314a;
        }

        @media (max-width: 450px) {
            .card { padding: 24px 16px 32px; }
            .action-btn { font-size: 1.8rem; padding: 16px; }
            .student-name { font-size: clamp(2.4rem, 13vw, 4rem); }
            .student-meta { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">
            <h1>25307 点名器</h1>
            <div class="badge">45人</div>
        </div>

        <!-- 显示区域 -->
        <div class="display-area">
            <div class="student-name" id="studentName">万丹妮</div>
            <div class="student-meta" id="studentDetail">学号 2530602 · 女</div>
            <div class="extra-info">
                <span>当前</span>
                <span class="count" id="studentIndex">第 1 位 / 45</span>
            </div>
        </div>

        <!-- 两个按钮：开始 / 停止 -->
        <div class="button-panel">
            <button class="action-btn start" id="startBtn" autofocus>▶ 开始</button>
            <button class="action-btn stop" id="stopBtn" disabled>⏹ 停止</button>
        </div>

        <div class="footer-note">
            ⚡ 数据源自 <strong>25307空白名单.xlsx</strong> · 点击停止随机抽取
        </div>
    </div>

    <script>
        (function() {
            // ----- 从 Excel 构建的学生数组 (学号, 姓名, 性别) -----
            const students = [
                { id: "2530602", name: "万丹妮", gender: "女" },
                { id: "2530605", name: "冯嘉怡", gender: "女" },
                { id: "2530613", name: "张峻熙", gender: "男" },
                { id: "2530620", name: "朱欣慧", gender: "女" },
                { id: "2530621", name: "秦彬源", gender: "男" },
                { id: "2530623", name: "杨婷", gender: "女" },
                { id: "2530624", name: "杨紫玥", gender: "女" },
                { id: "2530628", name: "濮文杰", gender: "男" },
                { id: "2530632", name: "罗浩雨", gender: "男" },
                { id: "2530636", name: "覃玉祥", gender: "男" },
                { id: "2530639", name: "赵俊皓", gender: "男" },
                { id: "2530644", name: "马奔", gender: "男" },
                { id: "2530646", name: "麻一涵", gender: "男" },
                { id: "2530702", name: "于胜晗", gender: "女" },
                { id: "2530703", name: "余俐霖", gender: "女" },
                { id: "2530704", name: "余新雷", gender: "男" },
                { id: "2530711", name: "张雨豪", gender: "男" },
                { id: "2530712", name: "徐天煜", gender: "男" },
                { id: "2530713", name: "戴佳欣", gender: "女" },
                { id: "2530716", name: "朱畅阳", gender: "男" },
                { id: "2530717", name: "朱秦宇", gender: "男" },
                { id: "2530718", name: "李万", gender: "男" },
                { id: "2530720", name: "李心圆", gender: "女" },
                { id: "2530723", name: "李雨轩", gender: "女" },
                { id: "2530725", name: "杨诗雨", gender: "女" },
                { id: "2530726", name: "梅如钰", gender: "女" },
                { id: "2530727", name: "沈伊泽", gender: "男" },
                { id: "2530728", name: "沈墨", gender: "男" },
                { id: "2530731", name: "王斯岩", gender: "女" },
                { id: "2530734", name: "章欣航", gender: "男" },
                { id: "2530736", name: "董盛超", gender: "男" },
                { id: "2530737", name: "袁佳宁", gender: "女" },
                { id: "2530740", name: "赵佳橦", gender: "女" },
                { id: "2530745", name: "马钰铷", gender: "女" },
                { id: "2530746", name: "黄烨扬", gender: "男" },
                { id: "2530747", name: "陆灵瑶", gender: "女" },
                { id: "2530748", name: "池哲辰", gender: "男" },
                { id: "2530749", name: "许豪杰", gender: "男" },
                { id: "2530750", name: "沈盛杰", gender: "男" },
                { id: "2530751", name: "吴泽凯", gender: "男" },
                { id: "2530752", name: "徐烽", gender: "男" },
                { id: "2530753", name: "杨君豪", gender: "男" },
                { id: "2530754", name: "张阳", gender: "男" },
                { id: "2530755", name: "路烨", gender: "男" },
                { id: "2530756", name: "张艺晨", gender: "男" }
            ];

            const total = students.length;  // 45

            // DOM 元素
            const studentNameEl = document.getElementById('studentName');
            const studentDetailEl = document.getElementById('studentDetail');
            const studentIndexEl = document.getElementById('studentIndex');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            // 状态变量
            let intervalId = null;           // 定时器ID
            let currentIndex = 0;             // 当前显示的学生索引 (0~44)

            // ----- 更新显示区域的函数 (根据索引) -----
            function renderStudentByIndex(index) {
                const s = students[index];
                studentNameEl.textContent = s.name;
                studentDetailEl.textContent = `学号 ${s.id} · ${s.gender}`;
                studentIndexEl.textContent = `第 ${index + 1} 位 / ${total}`;
                currentIndex = index;   // 同步记录
            }

            // 随机抽取一个索引 (0 ~ total-1)
            function getRandomStudentIndex() {
                return Math.floor(Math.random() * total);
            }

            // 定时器回调：随机更新一位学生
            function rollRandom() {
                const randomIdx = getRandomStudentIndex();
                renderStudentByIndex(randomIdx);
            }

            // 清除定时器，恢复按钮状态 (不改变当前显示)
            function stopRolling() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                // 按钮状态: 开始可用, 停止不可用
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }

            // 开始滚动 (先停止之前的, 再启动新的)
            function startRolling() {
                // 如果已有定时器，先清理 (防御性)
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                // 立刻刷新一次随机值，让反应更跟手 (也可以保留当前，但为了爽感，立刻换一个)
                rollRandom();

                // 启动新定时器 (~70ms 快速滚动，但不至于眼花)
                intervalId = setInterval(rollRandom, 70);

                // 按钮状态: 开始不可用, 停止可用
                startBtn.disabled = true;
                stopBtn.disabled = false;
            }

            // ----- 绑定事件 -----
            startBtn.addEventListener('click', function() {
                // 如果已经开始 (开始按钮disabled) 理论上不会触发，但防止程序异常
                if (startBtn.disabled) return;
                startRolling();
            });

            stopBtn.addEventListener('click', function() {
                // 停止按钮仅在可用时(滚动状态)才处理
                if (stopBtn.disabled) return;
                stopRolling();
            });

            // 初始化: 显示第一位学生 (万丹妮 索引0)
            renderStudentByIndex(7);
            // 确保停止按钮初始禁用，开始可用 (符合停止状态)
            stopBtn.disabled = true;
            startBtn.disabled = false;

            // 可选: 触摸设备优化——防止双击按钮放大（已经通过CSS处理）
            // 额外安全: 页面卸载时清理定时器 (虽然不是必须，但良好习惯)
            window.addEventListener('beforeunload', function() {
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
            });

            // 键盘快捷 (空格键: 开始/停止？简洁起见不干扰按钮功能，不加额外逻辑)
        })();
    </script>
</body>
</html>
